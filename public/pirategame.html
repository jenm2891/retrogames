<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pirate Negotiations</title>
    <link rel="stylesheet" href="css/pirate-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="main-nav">
  <ul>
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>

    <header>
        <h1>Captain Blackheart's Gambit</h1>
        <p>An AI-Powered Negotiation</p>
    </header>

    <main id="game-container">
        <div id="image-container">
            <div class="image-placeholder">
                <p>Scanning the horizon...</p>
            </div>
            <img id="scene-image" src="" alt="A scene from your negotiation on the high seas." style="display: none;">
        </div>
        <div id="chat-log">
            <!-- Game messages will appear here -->
        </div>
        <div id="options-container">
            <!-- AI generated choices will appear here -->
        </div>
    </main>
    
    <div id="loading-overlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <p>The Captain is ponderin' yer words...</p>
        </div>
    </div>

    <script src="js/pirate-script.js"></script>
</body>
</html>
